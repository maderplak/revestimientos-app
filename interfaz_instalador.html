<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Revestimientos — Panel Instalador</title>
<link rel="icon" href="data:," />
<style>
:root{
  --bg:#0f1411; --surface:#17201b; --surface2:#1e2a24; --card:#f7f5ef; --card2:#ffffff;
  --text:#162018; --muted:#6b716b; --line:#ddd8cd; --brand:#0b5d3b; --brand2:#0f7149;
  --danger:#b42318; --warn:#a15c00; --blue:#185abc; --ok:#0b6b40; --darkText:#f3f7f4;
  --shadow:0 10px 30px rgba(0,0,0,.10); --radius:18px;
}
*{box-sizing:border-box}
body{margin:0;background:#f3f0e8;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.topbar{position:sticky;top:0;z-index:20;background:#0b3f2c;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 0 rgba(255,255,255,.08)}
.brand{font-weight:800;letter-spacing:.2px;font-size:16px}.clock{font-size:12px;opacity:.8;white-space:nowrap}.wrap{max-width:980px;margin:0 auto;padding:12px 12px 88px}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0 14px;position:sticky;top:54px;z-index:15;background:#f3f0e8;padding:8px 0}
.tab{border:1px solid #d9d2c5;border-radius:999px;background:#fff;color:#2b2e2b;padding:10px 8px;font-weight:700;font-size:12px;line-height:1;cursor:pointer;min-height:42px}.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}.tab .badge{display:inline-flex;min-width:19px;height:19px;border-radius:999px;align-items:center;justify-content:center;font-size:11px;margin-left:4px;background:#efe8dd;color:#3f3b35}.tab.active .badge{background:rgba(255,255,255,.18);color:#fff}
.status{display:none;border-radius:14px;padding:12px 14px;margin:8px 0 12px;font-size:14px;border:1px solid}.status.show{display:block}.status.ok{background:#eaf7ef;color:#0b5d3b;border-color:#b8dfc7}.status.err{background:#fff0ed;color:#a42316;border-color:#f3b5ac}.status.info{background:#eef5ff;color:#174ea6;border-color:#c9ddff}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}.cardHead{padding:14px 14px 10px;border-bottom:1px solid #eee8dc}.id{font-size:12px;color:var(--muted);font-weight:700}.client{font-size:18px;font-weight:850;margin:4px 0 3px}.addr,.desc{font-size:13px;color:#52564f;line-height:1.35}.chiprow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.chip{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;background:#f0eee8;color:#3d403b}.chip.blue{background:#e8f0fe;color:#185abc}.chip.green{background:#e6f4ea;color:#137333}.chip.warn{background:#fff4e5;color:#9a5b00}.chip.red{background:#fce8e6;color:#a50e0e}
.cardBody{padding:14px}.sectionTitle{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#76736d;font-weight:850;margin:2px 0 10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}.field label{font-size:12px;font-weight:850;color:#4e544e}.field input,.field select,.field textarea{width:100%;border:1px solid #cfc8bb;border-radius:13px;background:#fff;padding:13px 12px;font-size:16px;color:#151815;outline:none}.field textarea{min-height:92px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(11,93,59,.12)}.hint{font-size:12px;color:#72756f;margin-top:-4px}.btn{width:100%;border:0;border-radius:14px;background:var(--brand);color:#fff;padding:14px 16px;font-weight:850;font-size:16px;min-height:50px;cursor:pointer}.btn:disabled{opacity:.55;cursor:not-allowed}.btn.secondary{background:#fff;color:var(--brand);border:1px solid var(--brand)}.btn.blue{background:#185abc}.btn.warn{background:#a15c00}.btnRow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.empty{background:#fff;border:1px dashed #cfc8bb;border-radius:18px;text-align:center;padding:36px 18px;color:#6c6c66}.slots{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0 14px}.slot{border:1px solid #cfc8bb;background:#fff;border-radius:12px;padding:12px 4px;font-size:15px;font-weight:850;text-align:center;cursor:pointer}.slot.selected{background:var(--brand);border-color:var(--brand);color:#fff}.slot:disabled{opacity:.35;cursor:not-allowed}.loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(11,93,59,.25);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-3px;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}
.todayItem{display:flex;gap:12px;align-items:flex-start;border-top:1px solid #eee8dc;padding:12px 0}.todayItem:first-child{border-top:0}.metaLine{font-size:12px;color:#6f736d;margin-top:2px}.actionHint{background:#eef5ff;border:1px solid #c9ddff;color:#174ea6;border-radius:12px;padding:9px 11px;font-size:12px;font-weight:750;margin-bottom:12px}.todayActions{margin-top:10px}.sectionGap{height:10px}.timeBox{min-width:62px;border-radius:12px;background:#edf4ef;color:#0b5d3b;text-align:center;padding:8px 6px;font-weight:900}.small{font-size:12px;color:#6f736d}.calcBox{border:1px solid #e1d8c9;background:#fbfaf7;border-radius:14px;padding:10px 12px;margin-bottom:12px;color:#474a45;font-size:13px}.checkList{display:grid;gap:8px;margin-bottom:12px}.check{display:flex;align-items:center;gap:10px;background:#faf9f5;border:1px solid #e4ded2;border-radius:13px;padding:12px}.check input{width:22px;height:22px;accent-color:var(--brand)}.check span{font-weight:750;font-size:14px}.hidden{display:none!important}
@media(max-width:680px){.wrap{padding:8px 8px 92px}.topbar{padding:13px 12px}.tabs{position:fixed;left:0;right:0;bottom:0;top:auto;margin:0;padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid #ddd;grid-template-columns:repeat(5,1fr);box-shadow:0 -6px 20px rgba(0,0,0,.08)}.tab{border-radius:14px;font-size:10px;padding:8px 4px;min-height:48px}.tab .badge{display:block;margin:4px auto 0}.grid2{grid-template-columns:1fr}.slots{grid-template-columns:repeat(3,1fr)}.client{font-size:17px}.card{border-radius:16px}.btnRow{grid-template-columns:1fr}.clock{display:none}}
@media(min-width:681px){.cardGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cardGrid .card{margin-bottom:0}}
</style>
</head>
<body>
<div class="topbar"><div class="brand">Revestimientos — Panel Instalador</div><div class="clock" id="clock"></div></div>
<div class="wrap">
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="hoy">Hoy <span class="badge" id="b-hoy">0</span></button>
    <button class="tab" data-tab="relevamiento">Relevar <span class="badge" id="b-relevamiento">0</span></button>
    <button class="tab" data-tab="coordinar">Coordinar <span class="badge" id="b-coordinar">0</span></button>
    <button class="tab" data-tab="calidad">Check <span class="badge" id="b-calidad">0</span></button>
    <button class="tab" data-tab="conforme">Conforme <span class="badge" id="b-conforme">0</span></button>
  </div>
  <div id="status" class="status"></div>
  <div id="app"></div>
</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyyxwT0JqzDOVpNP3Aj67aaquvqSHqCP96_pOQxOTdkA8xonGcnGE5-LSRuJiiTBlMc/exec';
const state = { tab:'hoy', proyectos:[], tareasHoy:[], alertas:[], dispCache:{}, dispPromises:{}, selectedSlots:{}, warmStarted:false };

const EST = { PEND:'Pendiente relevamiento', PRES:'Presupuesto pendiente', CONF:'Instalación confirmada', PROG:'Instalación programada', INST:'Instalado', OBS:'Instalación observada', CERR:'Cerrado' };
const MOTIVOS = ['Superficie en peor estado que lo relevado','Demora por condiciones del cliente','Mayor complejidad de cortes o terminaciones','Falta o ajuste de material','Herramientas/equipos','Estimación inicial insuficiente','Otro'];
function $(id){return document.getElementById(id)}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function show(msg,type='info'){const el=$('status'); el.className='status show '+type; el.textContent=msg; setTimeout(()=>{el.classList.remove('show')}, type==='err'?6500:3500)}
function todayStr(){const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function formatHuman(s){if(!s)return '—'; const [y,m,d]=String(s).slice(0,10).split('-'); return `${d}/${m}/${y}`}
function nowClock(){ $('clock').textContent = new Date().toLocaleString('es-AR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function normalizeList(res){ if(Array.isArray(res))return res; if(res&&Array.isArray(res.proyectos))return res.proyectos; if(res&&Array.isArray(res.data))return res.data; return []; }
async function apiGet(params){ const url = API_URL + '?' + new URLSearchParams(params).toString(); const r=await fetch(url,{redirect:'follow'}); if(!r.ok) throw new Error('Error HTTP '+r.status); return r.json(); }
async function apiAction(accion, datos){ const params = new URLSearchParams({accion, datos: encodeURIComponent(JSON.stringify(datos||{}))}); const r=await fetch(API_URL+'?'+params.toString(),{redirect:'follow'}); if(!r.ok) throw new Error('Error HTTP '+r.status); return r.json(); }
function mapProyecto(p){return {
  id:p.id||p.idProyecto,
  estado:p.estado||p.estadoProyecto,
  vendedor:p.vendedor||'',
  clienteNombre:p.clienteNombre||'',
  clienteTelefono:p.clienteTelefono||'',
  clienteWhatsapp:p.clienteWhatsapp||'',
  clienteDireccion:p.clienteDireccion||'',
  descripcionRelevamiento:p.descripcionRelevamiento||'',
  nroPresupuestoPreliminar:p.nroPresupuestoPreliminar||'',
  fechaRelevamiento:p.fechaRelevamiento||p.fecha||'',
  horaRelevamiento:p.horaRelevamiento||p.horaPactadaCliente||'',
  nroFactura:p.nroFactura||'',
  fechaInstalacion:p.fechaInstalacion||p.fechaInstalacionProgramada||'',
  horaInstalacion:p.horaInstalacion||p.horaPactadaClienteInstalacion||'',
  fechaDisponibleConforme:p.fechaDisponibleConforme||p.fechaDisponibleEnvio||'',
  fechaConfirmacionPresupuesto:p.fechaConfirmacionPresupuesto||'',
  fechaCreacion:p.fechaCreacion||'',
  ultimaActualizacion:p.ultimaActualizacion||'',
  m2:p.m2||p.m2Relevados||'',
  hsEst:p.hsEst||p.horasEstimadasInstalacion||'',
  observaciones:p.observaciones||p.observacionesRelevamiento||''
}}
async function loadAll(){ try{ show('Actualizando información...', 'info'); const [proy,hoy] = await Promise.all([apiGet({accion:'proyectos'}), apiGet({accion:'hoy'})]); state.proyectos = normalizeList(proy).map(mapProyecto); state.tareasHoy = (hoy&&hoy.tareasHoy)||[]; state.alertas = (hoy&&hoy.alertas)||[]; updateBadges(); render(); setTimeout(warmCoordinarAvailability,0); }catch(e){ console.error(e); show('No se pudo cargar información: '+e.message,'err'); render(); } }
function updateBadges(){ const c={hoy:state.tareasHoy.length+state.alertas.length,relevamiento:0,coordinar:0,calidad:0,conforme:0}; state.proyectos.forEach(p=>{ if(p.estado===EST.PEND)c.relevamiento++; if(p.estado===EST.CONF)c.coordinar++; if(p.estado===EST.PROG)c.calidad++; if(p.estado===EST.INST)c.conforme++; }); $('b-hoy').textContent=c.hoy; $('b-relevamiento').textContent=c.relevamiento; $('b-coordinar').textContent=c.coordinar; $('b-calidad').textContent=c.calidad; $('b-conforme').textContent=c.conforme; }
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{state.tab=b.dataset.tab; document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===state.tab)); render();}));
function render(){ if(state.tab==='hoy') return renderHoy(); if(state.tab==='relevamiento') return renderRelevamiento(); if(state.tab==='coordinar') return renderCoordinar(); if(state.tab==='calidad') return renderCalidad(); if(state.tab==='conforme') return renderConforme(); }
function renderCards(items, fn){ $('app').innerHTML = items.length ? `<div class="cardGrid">${items.map(fn).join('')}</div>` : `<div class="empty">No hay elementos pendientes en esta sección.</div>`; }
function cardBase(p, body){return `<div class="card"><div class="cardHead"><div class="id">${esc(p.id)} · ${esc(p.estado)}</div><div class="client">${esc(p.clienteNombre)}</div><div class="addr">${esc(p.clienteDireccion)}</div><div class="chiprow">${p.clienteTelefono?`<span class="chip">Tel. ${esc(p.clienteTelefono)}</span>`:''}${p.fechaRelevamiento?`<span class="chip blue">Rel. ${formatHuman(p.fechaRelevamiento)} ${esc(fmtTime(p.horaRelevamiento))}</span>`:''}${p.hsEst?`<span class="chip green">${esc(p.hsEst)} hs est.</span>`:''}</div></div><div class="cardBody">${body}</div></div>`}

function normDate(v){
  if(!v) return '';
  const str=String(v);
  if(/^\d{4}-\d{2}-\d{2}/.test(str)) return str.slice(0,10);
  const d=new Date(str);
  if(!isNaN(d.getTime())) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return str.slice(0,10);
}
function fmtTime(v){
  if(!v) return '';
  const str=String(v).trim();
  let m=str.match(/^(\d{1,2}):(\d{2})/);
  if(m) return `${String(m[1]).padStart(2,'0')}:${m[2]}`;
  // Si llega una hora serializada como fecha de 1899 desde Sheets, no mostramos la fecha completa.
  // De todos modos, el backend v5 ya envía las horas de Agenda como texto visible.
  m=str.match(/T(\d{2}):(\d{2})/);
  if(m) return `${m[1]}:${m[2]}`;
  m=str.match(/(\d{1,2}):(\d{2})/);
  if(m) return `${String(m[1]).padStart(2,'0')}:${m[2]}`;
  return str;
}
function dateTimeValue(fecha,hora){
  const f=normDate(fecha);
  const h=fmtTime(hora)||'23:59';
  if(!f) return 9999999999999;
  const t=new Date(`${f}T${h}:00`).getTime();
  return isNaN(t)?9999999999999:t;
}
function sortByAction(items, mode){
  return [...items].sort((a,b)=>actionTime(a,mode)-actionTime(b,mode));
}
function actionTime(p,mode){
  if(mode==='relevamiento') return dateTimeValue(p.fechaRelevamiento,p.horaRelevamiento);
  if(mode==='calidad') return dateTimeValue(p.fechaInstalacion,p.horaInstalacion);
  if(mode==='conforme') return dateTimeValue(p.fechaDisponibleConforme,'00:00');
  if(mode==='coordinar') return dateTimeValue(p.fechaConfirmacionPresupuesto||p.ultimaActualizacion||p.fechaCreacion,'00:00');
  return dateTimeValue(p.fechaCreacion||p.ultimaActualizacion,'00:00');
}
function proyectoPorId(id){return state.proyectos.find(p=>String(p.id)===String(id));}
function relevamientoBody(p){return `<div class="actionHint">Podés cargar este relevamiento desde esta tarjeta.</div><div class="sectionTitle">Guía del vendedor</div><div class="desc">${esc(p.descripcionRelevamiento||'Sin descripción')}</div>${p.nroPresupuestoPreliminar?`<div class="chiprow"><span class="chip warn">Presup. preliminar ${esc(p.nroPresupuestoPreliminar)}</span></div>`:''}<hr style="border:0;border-top:1px solid #eee8dc;margin:14px 0"><div class="grid2"><div class="field"><label>m² relevados</label><input id="m2-${p.id}" inputmode="decimal" placeholder="Ej: 12,5"></div><div class="field"><label>Horas estimadas</label><input id="hs-${p.id}" type="number" min="1" step="1" placeholder="Ej: 3"></div></div><div class="field"><label>Observaciones del relevamiento</label><textarea id="obs-${p.id}" placeholder="Condiciones de pared, terminaciones, dificultad, etc."></textarea></div><button class="btn" onclick="guardarRelevamiento('${p.id}')">Guardar relevamiento</button>`;}
function coordinarBody(p){return `<div class="sectionTitle">Datos de instalación</div><div class="calcBox"><b>${esc(p.hsEst||'—')} hs estimadas</b><br>Las horas no son editables. Vienen del relevamiento y mandan la planificación.</div><div class="field"><label>Fecha de instalación</label><input id="fecha-inst-${p.id}" type="date" min="${todayStr()}" onchange="cargarSlotsInstalacion('${p.id}')"></div><div id="slots-inst-${p.id}" class="small">Elegí una fecha para ver horarios reales disponibles.</div><div class="field"><label>Observación de coordinación</label><textarea id="coord-obs-${p.id}" placeholder="Opcional"></textarea></div><button class="btn blue" onclick="programarInstalacionUI('${p.id}')">Programar instalación</button>`;}
function calidadBody(p){return `<div class="sectionTitle">Performance</div><div class="grid2"><div class="field"><label>Fecha real</label><input id="freal-${p.id}" type="date" value="${todayStr()}"></div><div class="field"><label>m² instalados</label><input id="m2inst-${p.id}" inputmode="decimal" placeholder="Ej: ${esc(p.m2||'12,5')}"></div><div class="field"><label>Hora llegada</label><input id="hini-${p.id}" type="time" value="${esc(fmtTime(p.horaInstalacion)||'')}"></div><div class="field"><label>Hora cierre check</label><input id="hfin-${p.id}" type="time"></div></div><div id="desvioBox-${p.id}" class="calcBox">Si el desvío supera 20 minutos, el sistema exigirá motivo.</div><div class="field"><label>Motivo de desvío si aplica</label><select id="motivo-${p.id}"><option value="">Sin desvío significativo</option>${MOTIVOS.map(m=>`<option>${esc(m)}</option>`).join('')}</select></div><div class="field"><label>Observación performance</label><textarea id="operf-${p.id}" placeholder="Obligatoria si motivo = Otro"></textarea></div><div class="sectionTitle">Checklist calidad</div><div class="checkList">${['controlInstalacionOK|Revestimiento instalado correctamente','controlTerminacionesOK|Terminaciones revisadas','controlLimpiezaOK|Limpieza básica realizada','controlRetiroMaterialesOK|Materiales/herramientas retirados','controlClienteInformadoOK|Cliente informado'].map(x=>{const [idc,txt]=x.split('|'); return `<label class="check"><input id="${idc}-${p.id}" type="checkbox" checked><span>${txt}</span></label>`}).join('')}</div><div class="field"><label>¿Hubo desvío de calidad?</label><select id="desvcal-${p.id}" onchange="toggleDesvCal('${p.id}')"><option>No</option><option>Sí</option></select></div><div id="desvcalbox-${p.id}" class="hidden"><div class="field"><label>Detalle del desvío</label><textarea id="detcal-${p.id}"></textarea></div><div class="field"><label>Acción correctiva realizada</label><textarea id="acccal-${p.id}"></textarea></div></div><div class="field"><label>Observaciones finales</label><textarea id="ofinal-${p.id}" placeholder="Resultado final del servicio"></textarea></div><button class="btn" onclick="finalizarInstalacionUI('${p.id}')">Finalizar instalación</button>`;}
function conformeBody(p){return `<div class="sectionTitle">Conforme de obra</div><div class="calcBox">El backend valida si ya corresponde enviar el conforme según la fecha disponible. Si aún no corresponde, informará la fecha.</div><button class="btn" onclick="enviarConformeUI('${p.id}')">Generar WhatsApp y marcar enviado</button>`;}
function accionHoyBody(t,p){
  const estado=t.estadoProy||p?.estado||'';
  const tipo=t.tipo||'';
  if(p && tipo==='Relevamiento' && estado===EST.PEND) return relevamientoBody(p);
  if(p && tipo==='Instalación' && estado===EST.PROG) return calidadBody(p);
  if(p && estado===EST.INST) return conformeBody(p);
  return `<div class="calcBox">Esta tarea figura para hoy, pero no hay una acción disponible desde el estado actual: <b>${esc(estado||'—')}</b>.</div>`;
}
function renderTodayTask(t){
  const p=proyectoPorId(t.idProyecto) || mapProyecto({idProyecto:t.idProyecto,estadoProyecto:t.estadoProy,clienteNombre:t.clienteNombre,clienteDireccion:t.clienteDireccion});
  const hora=fmtTime(t.horaPactadaCliente||t.horaInicio||p.horaRelevamiento||p.horaInstalacion);
  return `<div class="card"><div class="cardHead"><div class="id">${esc(t.idProyecto||p.id||'')} · ${esc(t.tipo||'Tarea')}</div><div class="client">${esc(t.clienteNombre||p.clienteNombre||'')}</div><div class="addr">${esc(t.clienteDireccion||p.clienteDireccion||'')}</div><div class="chiprow"><span class="chip green">Hoy ${esc(hora||'')}</span><span class="chip blue">${esc(t.estadoProy||p.estado||'')}</span></div></div><div class="cardBody">${accionHoyBody(t,p)}</div></div>`;
}

function renderHoy(){
  const tareas=[...state.tareasHoy].sort((a,b)=>dateTimeValue(a.fecha||a.fechaBloque||todayStr(), a.horaPactadaCliente||a.horaInicio)-dateTimeValue(b.fecha||b.fechaBloque||todayStr(), b.horaPactadaCliente||b.horaInicio));
  let html='';
  if(tareas.length){
    html+=`<div class="sectionTitle">Tareas de hoy — actualizables desde acá</div><div class="cardGrid">${tareas.map(renderTodayTask).join('')}</div>`;
  }
  if(state.alertas.length){
    html+=`<div class="sectionGap"></div><div class="card"><div class="cardHead"><div class="client">Alertas</div></div><div class="cardBody">${state.alertas.map(a=>`<div class="todayItem"><div><span class="chip warn">${esc(a.tipo||'Alerta')}</span><div><b>${esc(a.clienteNombre||a.idProyecto||'')}</b></div><div class="small">${esc(a.clienteDireccion||'')}</div><div class="small">Disponible: ${formatHuman(a.fechaDisponible)}</div></div></div>`).join('')}</div></div>`;
  }
  $('app').innerHTML = html || `<div class="empty">No hay tareas ni alertas para hoy.</div>`;
}
function renderRelevamiento(){ const items=sortByAction(state.proyectos.filter(p=>p.estado===EST.PEND),'relevamiento'); renderCards(items,p=>cardBase(p,relevamientoBody(p))); }
async function guardarRelevamiento(id){ const m2=$(`m2-${id}`).value.trim(); const hs=$(`hs-${id}`).value.trim(); const obs=$(`obs-${id}`).value.trim(); if(!m2||!hs||!obs) return show('Completá m², horas estimadas y observaciones.','err'); if(Number(hs)%1!==0) return show('Las horas estimadas deben ser enteras.','err'); try{ const res=await apiAction('cargarRelevamiento',{idProyecto:id,m2Relevados:m2,horasEstimadasInstalacion:Number(hs),observacionesRelevamiento:obs}); if(!res.ok) throw new Error(res.error||'No se pudo guardar'); show('Relevamiento guardado correctamente.','ok'); await loadAll(); }catch(e){show(e.message,'err')} }
function dispKey(year, month, duracionMin){ return `${year}-${month}-Instalación-${duracionMin}`; }
function monthInfoFromDate(fecha){ const d=new Date(fecha+'T12:00:00'); return {year:d.getFullYear(), month:d.getMonth()}; }
async function getDisponibilidadInstalacion(year, month, duracionMin){
  const key=dispKey(year,month,duracionMin);
  if(state.dispCache[key]) return state.dispCache[key];
  if(state.dispPromises[key]) return state.dispPromises[key];
  state.dispPromises[key]=apiGet({accion:'disponibilidadMes',anio:year,mes:month,tipoBloque:'Instalación',duracionTrabajoMin:duracionMin})
    .then(res=>{ if(!res.ok) throw new Error(res.error||'No se pudo consultar disponibilidad'); state.dispCache[key]=res; delete state.dispPromises[key]; return res; })
    .catch(err=>{ delete state.dispPromises[key]; throw err; });
  return state.dispPromises[key];
}
function renderSlotsInstalacion(id, fecha, disponibilidad){
  const box=$(`slots-inst-${id}`);
  state.selectedSlots[id]='';
  const dia=disponibilidad && disponibilidad.dias ? disponibilidad.dias[fecha] : null;
  const slots=(dia&&dia.slots)||[];
  if(!slots.length){ box.innerHTML='<div class="calcBox">No hay horarios disponibles para esa fecha.</div>'; return; }
  box.innerHTML=`<div class="slots">${slots.map(s=>`<button type="button" class="slot" onclick="selectSlot('${id}','${s.hora||s.horaPactadaCliente}',this)">${s.hora||s.horaPactadaCliente}</button>`).join('')}</div>`;
}
function warmCoordinarAvailability(){
  const confirmados=state.proyectos.filter(p=>p.estado===EST.CONF && Number(p.hsEst||0)>0);
  if(!confirmados.length) return;
  const now=new Date();
  const months=[{year:now.getFullYear(),month:now.getMonth()},{year:new Date(now.getFullYear(),now.getMonth()+1,1).getFullYear(),month:new Date(now.getFullYear(),now.getMonth()+1,1).getMonth()}];
  const duraciones=[...new Set(confirmados.map(p=>Number(p.hsEst||0)*60).filter(Boolean))];
  duraciones.forEach(dur=>months.forEach(m=>getDisponibilidadInstalacion(m.year,m.month,dur).catch(()=>{})));
}
function renderCoordinar(){ const items=sortByAction(state.proyectos.filter(p=>p.estado===EST.CONF),'coordinar'); renderCards(items,p=>cardBase(p,coordinarBody(p))); setTimeout(warmCoordinarAvailability,0); }
async function cargarSlotsInstalacion(id){
  const p=state.proyectos.find(x=>x.id===id); const fecha=$(`fecha-inst-${id}`).value; const box=$(`slots-inst-${id}`); state.selectedSlots[id]=''; if(!fecha||!p) return;
  const duracionMin=Number(p.hsEst||0)*60;
  if(!duracionMin){ box.innerHTML='<div class="calcBox" style="color:#a42316">No hay horas estimadas cargadas para este proyecto.</div>'; return; }
  const {year,month}=monthInfoFromDate(fecha); const key=dispKey(year,month,duracionMin);
  if(state.dispCache[key]){ renderSlotsInstalacion(id,fecha,state.dispCache[key]); return; }
  box.innerHTML='<span class="loader"></span>Preparando agenda del mes...';
  try{ const res=await getDisponibilidadInstalacion(year,month,duracionMin); renderSlotsInstalacion(id,fecha,res); }catch(e){box.innerHTML=`<div class="calcBox" style="color:#a42316">${esc(e.message)}</div>`;}
}
function selectSlot(id,hora,el){ state.selectedSlots[id]=hora; const cont=el.parentElement; cont.querySelectorAll('.slot').forEach(b=>b.classList.remove('selected')); el.classList.add('selected'); }
async function programarInstalacionUI(id){ const p=state.proyectos.find(x=>x.id===id); const fecha=$(`fecha-inst-${id}`).value; const hora=state.selectedSlots[id]; const obs=$(`coord-obs-${id}`).value.trim(); if(!fecha||!hora) return show('Seleccioná fecha y horario disponible.','err'); try{ const check=await apiGet({accion:'slotsDia',fecha:fecha,tipoBloque:'Instalación',duracionTrabajoMin:Number(p.hsEst||0)*60}); const okSlot=(check.slots||[]).some(s=>(s.hora||s.horaPactadaCliente)===hora); if(!check.ok || !okSlot) throw new Error('El horario ya no está disponible. Elegí otro.'); const res=await apiAction('programarInstalacion',{idProyecto:id,fechaInstalacion:fecha,horaPactadaCliente:hora,observacionCoordinacion:obs}); if(!res.ok) throw new Error(res.error||'No se pudo programar'); show('Instalación programada. Abrí el WhatsApp si corresponde.','ok'); if(res.whatsapp && res.whatsapp.url) window.open(res.whatsapp.url,'_blank'); await loadAll(); }catch(e){show(e.message,'err')} }
function renderCalidad(){ const items=sortByAction(state.proyectos.filter(p=>p.estado===EST.PROG),'calidad'); renderCards(items,p=>cardBase(p,calidadBody(p))); }
function toggleDesvCal(id){ $(`desvcalbox-${id}`).classList.toggle('hidden', $(`desvcal-${id}`).value!=='Sí'); }
async function finalizarInstalacionUI(id){ const g=(x)=>$(x+'-'+id); const p=state.proyectos.find(x=>x.id===id); const req=['freal','hini','hfin','m2inst','ofinal']; for(const r of req){ if(!g(r).value.trim()) return show('Completá los campos obligatorios de performance y observaciones finales.','err'); } const checks=['controlInstalacionOK','controlTerminacionesOK','controlLimpiezaOK','controlRetiroMaterialesOK','controlClienteInformadoOK']; if(checks.some(c=>!g(c).checked)) return show('Todos los controles deben quedar OK para finalizar.','err'); const hubo=g('desvcal').value; if(hubo==='Sí' && (!g('detcal').value.trim() || !g('acccal').value.trim())) return show('Completá detalle y acción correctiva del desvío de calidad.','err'); try{ const data={idProyecto:id,fechaInstalacionReal:g('freal').value,horaLlegadaDomicilio:g('hini').value,horaFinalizacionCheck:g('hfin').value,m2Instalados:g('m2inst').value,motivoDesvio:g('motivo').value,observacionPerformance:g('operf').value,controlInstalacionOK:'OK',controlTerminacionesOK:'OK',controlLimpiezaOK:'OK',controlRetiroMaterialesOK:'OK',controlClienteInformadoOK:'OK',huboDesvioCalidad:hubo,detalleDesvioCalidad:g('detcal')?g('detcal').value:'',accionCorrectiva:g('acccal')?g('acccal').value:'',observacionesFinales:g('ofinal').value}; const res=await apiAction('finalizarInstalacion',data); if(!res.ok) throw new Error(res.error||'No se pudo finalizar'); show('Instalación finalizada. Conforme pendiente generado.','ok'); await loadAll(); }catch(e){show(e.message,'err')} }
function renderConforme(){ const items=sortByAction(state.proyectos.filter(p=>p.estado===EST.INST),'conforme'); renderCards(items,p=>cardBase(p,conformeBody(p))); }
async function enviarConformeUI(id){ try{ const res=await apiAction('enviarConforme',{idProyecto:id}); if(!res.ok) throw new Error(res.error||'No se pudo enviar conforme'); show('Conforme marcado como enviado.','ok'); if(res.whatsapp && res.whatsapp.url) window.open(res.whatsapp.url,'_blank'); await loadAll(); }catch(e){show(e.message,'err')} }
nowClock(); setInterval(nowClock,30000); loadAll();
</script>
