<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva Venta — Revestimientos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F3EF; --surface: #FFFFFF; --border: #E2DDD6; --border-2: #CCC7BF;
    --text: #1A1814; --muted: #6B6760; --hint: #A09C97;
    --accent: #1A5C45; --accent-bg: #E8F2EE; --accent-bd: #A8CFC0;
    --danger: #C0392B; --ok-bg: #E8F2EE; --ok-bd: #A8CFC0; --ok-text: #1A5C45;
    --slot-free: #F0F7F4; --radius: 10px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; color: var(--accent); letter-spacing: -.02em; }
  .topbar-brand .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .topbar-right { font-size: 13px; color: var(--muted); }
  .loading-overlay { position: fixed; inset: 0; background: rgba(245,243,239,.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; transition: opacity .3s; }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-overlay p { font-size: 14px; color: var(--muted); }
  .spinner-lg { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .layout { display: grid; grid-template-columns: 420px 1fr; min-height: calc(100vh - 56px); }
  .panel-left { background: var(--surface); border-right: 1px solid var(--border); padding: 28px; display: flex; flex-direction: column; }
  .section-title { font-size: 11px; font-weight: 500; color: var(--hint); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .cal-nav-btn { background: none; border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; transition: all .15s; }
  .cal-nav-btn:hover { background: var(--bg); border-color: var(--border-2); color: var(--text); }
  .cal-month { font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: -.01em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 11px; font-weight: 500; color: var(--hint); padding: 4px 0 10px; text-transform: uppercase; letter-spacing: .05em; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--text); transition: all .12s; border: 1px solid transparent; position: relative; }
  .cal-day:hover:not(.empty):not(.past) { background: var(--bg); border-color: var(--border); }
  .cal-day.empty, .cal-day.past { cursor: default; color: var(--hint); }
  .cal-day.today { font-weight: 600; color: var(--accent); }
  .cal-day.today::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }
  .cal-day.selected { background: var(--accent); color: #fff; font-weight: 500; border-color: var(--accent); }
  .cal-day.has-events::before { content: ''; position: absolute; top: 5px; right: 5px; width: 5px; height: 5px; background: #E8A020; border-radius: 50%; }
  .cal-day.selected.has-events::before { background: rgba(255,255,255,.6); }
  .cal-day.selected.today::after { background: rgba(255,255,255,.5); }
  .slots-wrap { margin-top: 24px; flex: 1; overflow-y: auto; padding-bottom: 12px; }
  .slots-date-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 12px; }
  .slots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .slot { padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--slot-free); cursor: pointer; transition: all .12s; display: flex; flex-direction: column; gap: 2px; }
  .slot:hover { border-color: var(--accent-bd); background: var(--accent-bg); }
  .slot.selected { border-color: var(--accent); background: var(--accent-bg); }
  .slot-time { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .slot-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .slot.selected .slot-time { color: var(--accent); }
  .slots-empty { text-align: center; padding: 32px 0; color: var(--hint); font-size: 13px; }
  .panel-right { padding: 28px 36px; overflow-y: auto; }
  .form-header { margin-bottom: 28px; }
  .form-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 4px; }
  .form-header p { font-size: 13px; color: var(--muted); }
  .selection-pill { display: inline-flex; align-items: center; gap: 8px; background: var(--accent-bg); border: 1px solid var(--accent-bd); border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 500; color: var(--accent); margin-bottom: 28px; }
  .pill-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .block-summary { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .block-item { display: flex; flex-direction: column; gap: 3px; }
  .block-item-label { font-size: 11px; color: var(--hint); text-transform: uppercase; letter-spacing: .05em; }
  .block-item-val { font-size: 14px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .form-section { margin-bottom: 28px; }
  .form-section-label { font-size: 11px; font-weight: 500; color: var(--hint); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-row.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--muted); }
  .field input, .field select { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; outline: none; transition: border-color .15s; width: 100%; }
  .field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,92,69,.08); }
  .btn-confirm { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all .15s; letter-spacing: -.01em; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-confirm:hover:not(:disabled) { background: #154f3a; }
  .btn-confirm:disabled { background: var(--hint); cursor: not-allowed; }
  .btn-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
  .btn-confirm.loading .btn-spinner { display: block; }
  .msg { border-radius: var(--radius); padding: 12px 16px; font-size: 13px; margin-bottom: 20px; display: none; }
  .msg.error { background: #FEE; border: 1px solid #F5C0C0; color: var(--danger); }
  .msg.success { background: var(--ok-bg); border: 1px solid var(--ok-bd); color: var(--ok-text); }
  .msg.visible { display: block; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center; color: var(--hint); gap: 12px; }
  .empty-state .icon { font-size: 36px; opacity: .4; }
  .empty-state p { font-size: 14px; max-width: 240px; line-height: 1.6; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner-lg"></div>
  <p>Cargando disponibilidad...</p>
</div>

<div class="topbar">
  <div class="topbar-brand"><div class="dot"></div>Revestimientos — Nueva venta</div>
  <div class="topbar-right" id="clock"></div>
</div>

<div class="layout">
  <div class="panel-left">
    <div class="section-title">Seleccioná un día</div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <span class="cal-month" id="cal-month-label"></span>
      <button class="cal-nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="slots-wrap" id="slots-wrap">
      <div class="slots-empty">Elegí un día para ver horarios disponibles</div>
    </div>
  </div>
  <div class="panel-right" id="panel-right">
    <div class="empty-state">
      <div class="icon">&#128197;</div>
      <p>Elegí un día y horario en el calendario para continuar</p>
    </div>
  </div>
</div>

<script>
const state = {
  today: new Date(),
  viewYear: new Date().getFullYear(),
  viewMonth: new Date().getMonth(),
  selectedDate: null,
  selectedSlot: null,
  slots: [],
  cache: {},
};

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_CORTO = ['Do','Lu','Ma','Mi','Ju','Vi','Sa'];
const VENDEDORES = ['Claudia Rodriguez','Alejandro Gurrea','Paola Alvarez','Daniel Dulor','Nestor Lombardini','Manuel Sosa'];

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' }) +
    '  ' + now.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 10000);

function timeToMin(t) { const p = String(t).split(':'); return parseInt(p[0])*60+parseInt(p[1]||0); }
function minToTime(m) { return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function formatDateHuman(str) {
  const [y,m,d] = str.split('-');
  const dias = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  const dt = new Date(+y,+m-1,+d);
  return `${dias[dt.getDay()]} ${+d} de ${MESES[+m-1]}`;
}

function calcularSlotsLocales(fechaStr) {
  const key = `${state.viewYear}-${state.viewMonth}`;
  const cached = state.cache[key];
  if (!cached || !cached.bloques || !cached.config) return [];
  const { bloques: todos, config } = cached;
  const del_dia = todos[fechaStr] || [];
  const todayStr = formatDate(state.today);
  let ini = config.jornadaIni;
  if (fechaStr === todayStr) {
    const now = new Date();
    ini = Math.ceil((now.getHours()*60+now.getMinutes())/30)*30;
  }
  const slots = [];
  for (let t = ini; t + config.durRelev <= config.jornadaFin; t += 30) {
    const fin = t + config.durRelev;
    if (del_dia.every(b => fin <= b.ini || t >= b.fin))
      slots.push({ inicio: minToTime(t), fin: minToTime(fin) });
  }
  return slots;
}

function cargarMes(anio, mes, callback) {
  const key = `${anio}-${mes}`;
  if (state.cache[key]) { callback(); return; }
  apiGet({ accion: 'bloques', anio, mes })
    .then(data => { state.cache[key] = data; callback(); })
    .catch(() => { document.getElementById('loading-overlay').classList.add('hidden'); alert('Error al cargar. Recargá la página.'); });
}

function renderCalendar() {
  const { viewYear, viewMonth } = state;
  document.getElementById('cal-month-label').textContent = `${MESES[viewMonth]} ${viewYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DIAS_CORTO.forEach(d => { const el = document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el); });
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const key = `${viewYear}-${viewMonth}`;
  const bloques = state.cache[key] ? state.cache[key].bloques : {};
  for (let i=0;i<firstDay;i++) { const el=document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el); }
  for (let d=1;d<=daysInMonth;d++) {
    const el = document.createElement('div'); el.className='cal-day'; el.textContent=d;
    const dt = new Date(viewYear,viewMonth,d);
    const isPast = dt < new Date(state.today.getFullYear(),state.today.getMonth(),state.today.getDate());
    const isToday = d===state.today.getDate()&&viewMonth===state.today.getMonth()&&viewYear===state.today.getFullYear();
    const isSun = dt.getDay()===0;
    const dateStr = formatDate(dt);
    if (isPast||isSun) el.classList.add('past');
    if (isToday) el.classList.add('today');
    if (bloques[dateStr]) el.classList.add('has-events');
    if (state.selectedDate===dateStr) el.classList.add('selected');
    if (!isPast&&!isSun) el.onclick = () => selectDate(dateStr);
    grid.appendChild(el);
  }
}

function changeMonth(dir) {
  state.viewMonth += dir;
  if (state.viewMonth>11){state.viewMonth=0;state.viewYear++;}
  if (state.viewMonth<0){state.viewMonth=11;state.viewYear--;}
  const key = `${state.viewYear}-${state.viewMonth}`;
  if (!state.cache[key]) document.getElementById('loading-overlay').classList.remove('hidden');
  cargarMes(state.viewYear, state.viewMonth, () => {
    document.getElementById('loading-overlay').classList.add('hidden');
    renderCalendar();
  });
}

function selectDate(dateStr) {
  state.selectedDate = dateStr;
  state.selectedSlot = null;
  renderCalendar();
  const slots = calcularSlotsLocales(dateStr);
  state.slots = slots;
  const wrap = document.getElementById('slots-wrap');
  if (!slots.length) { wrap.innerHTML=`<div class="slots-empty">No hay horarios disponibles para este dia.</div>`; renderFormEmpty(); return; }
  let html = `<div class="slots-date-label">${formatDateHuman(dateStr)}</div>`;
  html += `<div class="section-title">Horarios disponibles — relevamiento (1 hora)</div><div class="slots-grid">`;
  slots.forEach((s,i) => { html+=`<div class="slot" onclick="selectSlot(${i})" id="slot-${i}"><span class="slot-time">${s.inicio} – ${s.fin}</span><span class="slot-label">Libre</span></div>`; });
  html += `</div>`;
  wrap.innerHTML = html;
  renderFormEmpty();
}

function selectSlot(i) {
  document.querySelectorAll('.slot').forEach(el=>el.classList.remove('selected'));
  document.getElementById(`slot-${i}`).classList.add('selected');
  state.selectedSlot = state.slots[i];
  renderForm();
}

function renderFormEmpty() {
  document.getElementById('panel-right').innerHTML=`<div class="empty-state"><div class="icon">&#128337;</div><p>Ahora elegi un horario disponible del calendario</p></div>`;
}

function renderForm() {
  const {selectedDate,selectedSlot} = state;
  const opts = VENDEDORES.map(v=>`<option value="${v}">${v}</option>`).join('');
  document.getElementById('panel-right').innerHTML = `
    <div class="form-header"><h1>Nueva venta</h1><p>Completa los datos del cliente para reservar el relevamiento</p></div>
    <div class="selection-pill"><div class="pill-dot"></div><span>Relevamiento: ${formatDateHuman(selectedDate)} — ${selectedSlot.inicio} a ${selectedSlot.fin}</span></div>
    <div class="block-summary">
      <div class="block-item"><span class="block-item-label">Fecha</span><span class="block-item-val">${selectedDate}</span></div>
      <div class="block-item"><span class="block-item-label">Hora inicio</span><span class="block-item-val">${selectedSlot.inicio}</span></div>
      <div class="block-item"><span class="block-item-label">Hora fin</span><span class="block-item-val">${selectedSlot.fin}</span></div>
    </div>
    <div id="msg-error" class="msg error"></div>
    <div id="msg-success" class="msg success"></div>
    <div class="form-section">
      <div class="form-section-label">Vendedor</div>
      <div class="form-row full"><div class="field"><label>Vendedor</label><select id="f-vendedor">${opts}</select></div></div>
    </div>
    <div class="form-section">
      <div class="form-section-label">Datos del cliente</div>
      <div class="form-row">
        <div class="field"><label>Nombre completo *</label><input type="text" id="f-nombre" placeholder="Ej: Juan Garcia" /></div>
        <div class="field"><label>Telefono *</label><input type="tel" id="f-telefono" placeholder="Ej: 381-555-1234" /></div>
      </div>
      <div class="form-row full"><div class="field"><label>Direccion de obra *</label><input type="text" id="f-direccion" placeholder="Ej: Av. San Martin 1245, Tucuman" /></div></div>
      <div class="form-row">
        <div class="field"><label>Nro. de factura *</label><input type="text" id="f-factura" placeholder="Ej: FC-00125" /></div>
        <div class="field"><label>Producto vendido *</label><input type="text" id="f-producto" placeholder="Ej: Porcelanato 60x60 Gris" /></div>
      </div>
    </div>
    <button class="btn-confirm" id="btn-confirmar" onclick="confirmarVenta()">
      <div class="btn-spinner"></div>
      <span id="btn-text">Confirmar y reservar turno de relevamiento</span>
    </button>`;
}

function confirmarVenta() {
  const nombre   = document.getElementById('f-nombre').value.trim();
  const telefono = document.getElementById('f-telefono').value.trim();
  const direccion= document.getElementById('f-direccion').value.trim();
  const factura  = document.getElementById('f-factura').value.trim();
  const producto = document.getElementById('f-producto').value.trim();
  const vendedor = document.getElementById('f-vendedor').value;
  const errEl    = document.getElementById('msg-error');
  errEl.className='msg error';
  if (!nombre||!telefono||!direccion||!factura||!producto) {
    errEl.textContent='Completa todos los campos obligatorios antes de continuar.';
    errEl.className='msg error visible'; return;
  }
  const btn = document.getElementById('btn-confirmar');
  btn.classList.add('loading'); btn.disabled=true;
  document.getElementById('btn-text').textContent='Guardando...';
  apiPost('registrarProyecto', {vendedor,clienteNombre:nombre,clienteTelefono:telefono,clienteDireccion:direccion,nroFactura:factura,producto,fecha:state.selectedDate,horaInicio:state.selectedSlot.inicio})
    .then(res => {
      btn.classList.remove('loading');
      if (res.ok) {
        document.getElementById('msg-success').textContent='Turno reservado. ID: '+res.idProyecto+' — Relevamiento de '+state.selectedSlot.inicio+' a '+res.horaFin+'.';
        document.getElementById('msg-success').className='msg success visible';
        document.getElementById('btn-text').textContent='Turno confirmado';
        const key=state.viewYear+'-'+state.viewMonth;
        if (!state.cache[key].bloques[state.selectedDate]) state.cache[key].bloques[state.selectedDate]=[];
        state.cache[key].bloques[state.selectedDate].push({ini:timeToMin(state.selectedSlot.inicio),fin:timeToMin(state.selectedSlot.fin)});
        state.selectedSlot=null; renderCalendar();
        document.querySelectorAll('.field input,.field select').forEach(el=>el.disabled=true);
      } else {
        errEl.textContent='Error: '+res.error+'. Elegi otro horario.';
        errEl.className='msg error visible';
        btn.disabled=false;
        document.getElementById('btn-text').textContent='Confirmar y reservar turno de relevamiento';
        selectDate(state.selectedDate);
      }
    })
    .catch(() => {
      btn.classList.remove('loading'); btn.disabled=false;
      document.getElementById('btn-text').textContent='Confirmar y reservar turno de relevamiento';
      document.getElementById('msg-error').textContent='Error de conexion. Intenta de nuevo.';
      document.getElementById('msg-error').className='msg error visible';
    });
}

// URL de la API — reemplazá con tu URL de Apps Script
const API_URL = 'https://script.google.com/macros/s/AKfycbwo5nWH5iYhVpSKLzxBKz1nvhHrS2M1unnOZznxCJzrWPJGIJSubv5kMrOn6Yd_CfJV/exec';

async function apiGet(params) {
  const url = API_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function apiPost(accion, datos) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ accion, datos })
  });
  return res.json();
}

cargarMes(state.viewYear, state.viewMonth, () => {
  document.getElementById('loading-overlay').classList.add('hidden');
  renderCalendar();
});
</script>
</body>
</html>
