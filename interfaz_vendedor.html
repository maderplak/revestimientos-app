<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Vendedor — Revestimientos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#F5F3EF; --surface:#FFFFFF; --border:#E2DDD6; --border-2:#CCC7BF;
  --text:#1A1814; --muted:#6B6760; --hint:#A09C97;
  --accent:#1A5C45; --accent-bg:#E8F2EE; --accent-bd:#A8CFC0;
  --amber:#C07800; --amber-bg:#FEF3E2; --amber-bd:#F0C070;
  --blue:#1850A0; --blue-bg:#EBF2FF; --blue-bd:#90B8F8;
  --danger:#C0392B; --radius:10px;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:54px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.brand { display:flex; align-items:center; gap:10px; font-weight:600; font-size:15px; color:var(--accent); }
.brand-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; }
.topbar-right { font-size:12px; color:var(--muted); }

/* LOADING */
.loading-overlay { position:fixed; inset:0; background:rgba(245,243,239,.92); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:999; transition:opacity .3s; }
.loading-overlay.hidden { opacity:0; pointer-events:none; }
.spinner-lg { width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* TABS */
.tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface); overflow-x:auto; padding:0 16px; scrollbar-width:none; }
.tab { padding:14px 16px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s; display:flex; align-items:center; gap:7px; }
.tab.active { color:var(--text); border-bottom-color:var(--accent); }
.tab-badge { font-size:10px; font-weight:600; padding:2px 6px; border-radius:10px; font-family:'DM Mono',monospace; }
.badge-green  { background:var(--accent-bg); color:var(--accent); border:1px solid var(--accent-bd); }
.badge-amber  { background:var(--amber-bg);  color:var(--amber);  border:1px solid var(--amber-bd); }
.badge-blue   { background:var(--blue-bg);   color:var(--blue);   border:1px solid var(--blue-bd); }

/* LAYOUT */
.layout { display:grid; grid-template-columns:400px 1fr; min-height:calc(100vh - 97px); }
@media(max-width:860px){ .layout { grid-template-columns:1fr; } }
.panel-left { background:var(--surface); border-right:1px solid var(--border); padding:24px; display:flex; flex-direction:column; }
.panel-right { padding:24px 32px; overflow-y:auto; }

/* CALENDARIO */
.section-title { font-size:11px; font-weight:500; color:var(--hint); text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; }
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.cal-nav-btn { background:none; border:1px solid var(--border); border-radius:6px; width:30px; height:30px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); }
.cal-month { font-size:14px; font-weight:500; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-dow { text-align:center; font-size:10px; color:var(--hint); padding:3px 0 8px; text-transform:uppercase; }
.cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:7px; font-size:12px; cursor:pointer; position:relative; }
.cal-day.empty, .cal-day.past { cursor:default; color:var(--hint); }
.cal-day.today { font-weight:600; color:var(--accent); }
.cal-day.selected { background:var(--accent); color:#fff; }
.cal-day.has-events::before { content:''; position:absolute; top:4px; right:4px; width:4px; height:4px; background:#E8A020; border-radius:50%; }

/* SLOTS */
.slots-wrap { margin-top:20px; flex:1; overflow-y:auto; }
.slots-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:10px; }
.slot { padding:9px 11px; border-radius:7px; border:1px solid var(--border); background:#F0F7F4; cursor:pointer; }
.slot.selected { border-color:var(--accent); background:var(--accent-bg); }
.slot-time { font-size:12px; font-weight:500; font-family:'DM Mono',monospace; }

/* FORM & CARDS */
.main { max-width:800px; margin:0 auto; padding:20px 16px 40px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; padding:16px; }
.card-id { font-size:11px; font-family:'DM Mono',monospace; color:var(--muted); }
.card-name { font-size:15px; font-weight:600; margin:4px 0; }
.card-addr { font-size:12px; color:var(--muted); }
.status-chip { display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; margin-top:8px; }
.s-pendiente { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-bd); }
.s-presupuesto { background:#FFF0F5; color:#A0186A; border:1px solid #F0A0C8; }
.s-confirmada { background:var(--blue-bg); color:var(--blue); border:1px solid var(--blue-bd); }
.s-programada { background:var(--accent-bg); color:var(--accent); border:1px solid var(--accent-bd); }

.field { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
.field label { font-size:12px; font-weight:500; color:var(--muted); }
.field input, .field select { font-family:inherit; font-size:14px; padding:10px; border:1px solid var(--border); border-radius:var(--radius); width:100%; }
.btn { width:100%; padding:13px; border:none; border-radius:var(--radius); font-weight:600; cursor:pointer; background:var(--accent); color:#fff; transition: opacity .2s; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { padding:10px; border-radius:var(--radius); font-size:13px; margin-bottom:15px; display:none; }
.msg.visible { display:block; }
.msg.error { background:#FEE; color:var(--danger); }
.msg.success { background:var(--accent-bg); color:var(--accent); }
</style>
</head>
<body onload="init()">

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner-lg"></div>
  <p>Cargando datos del sistema...</p>
</div>

<div class="topbar">
  <div class="brand"><div class="brand-dot"></div>Revestimientos — Panel Vendedor</div>
  <div class="topbar-right" id="clock"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="nueva" onclick="switchTab('nueva')">Nueva solicitud</div>
  <div class="tab" data-tab="presupuesto" onclick="switchTab('presupuesto')">Confirmar Venta <span class="tab-badge badge-amber" id="badge-presupuesto">0</span></div>
  <div class="tab" data-tab="activos" onclick="switchTab('activos')">Proyectos activos <span class="tab-badge badge-blue" id="badge-activos">0</span></div>
</div>

<div id="tab-content"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwV575o3ZEghQyYhpU12MnAfUxk7fPjcCBnNc2rPoBvy7WaUQO2yhs_y4rsnldqOgCV/exec';

const state = {
  tab: 'nueva',
  viewYear: new Date().getFullYear(),
  viewMonth: new Date().getMonth(),
  selectedDate: null,
  selectedSlot: null,
  slots: [],
  cache: {},
  proyectos: [],
};

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_CORTO = ['Do','Lu','Ma','Mi','Ju','Vi','Sa'];
const VENDEDORES = ['Claudia Rodriguez','Alejandro Gurrea','Paola Alvarez','Daniel Dulor','Nestor Lombardini','Manuel Sosa'];

// ── Helpers ───────────────────────────────────────────────────────────────────
async function apiGet(params) {
  const url = API_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url, {redirect:'follow'});
  return res.json();
}
async function apiWrite(accion, datos) {
  const params = new URLSearchParams({ accion, datos: encodeURIComponent(JSON.stringify(datos)) });
  const res = await fetch(API_URL + '?' + params, {redirect:'follow'});
  return res.json();
}
function formatDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function minToTime(m) { return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }

// ── Inicialización ────────────────────────────────────────────────────────────
function init() {
  // Cargar proyectos y el mes actual simultáneamente
  Promise.all([
    apiGet({accion:'getProyectosVendedor'}).then(data => state.proyectos = data || []),
    cargarMes(state.viewYear, state.viewMonth)
  ]).then(() => {
    actualizarBadges();
    document.getElementById('loading-overlay').classList.add('hidden');
    switchTab('nueva');
  });
}

function cargarMes(anio, mes) {
  const key = anio + '-' + mes;
  if (state.cache[key]) return Promise.resolve();
  return apiGet({accion:'bloques', anio, mes}).then(data => {
    state.cache[key] = data;
  });
}

function actualizarBadges() {
  const presup = state.proyectos.filter(p => p.estado === 'Presupuesto pendiente').length;
  const activos = state.proyectos.filter(p => p.estado !== 'Cerrado').length;
  document.getElementById('badge-presupuesto').textContent = presup;
  document.getElementById('badge-activos').textContent = activos;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  const content = document.getElementById('tab-content');
  
  if (tab === 'nueva') {
    content.innerHTML = renderTabNuevaVenta();
    renderCalendar();
  } else if (tab === 'presupuesto') {
    content.innerHTML = '<div class="main">' + renderTabPresupuesto() + '</div>';
  } else {
    content.innerHTML = '<div class="main">' + renderTabActivos() + '</div>';
  }
}

// ── Render Nueva Venta ────────────────────────────────────────────────────────
function renderTabNuevaVenta() {
  return `<div class="layout">
    <div class="panel-left">
      <div class="section-title">Turnos Relevamiento</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">←</button>
        <span class="cal-month" id="cal-month-label">${MESES[state.viewMonth]} ${state.viewYear}</span>
        <button class="cal-nav-btn" onclick="changeMonth(1)">→</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="slots-wrap" id="slots-wrap"><div style="color:var(--hint);font-size:13px;text-align:center;padding:20px">Seleccioná un día</div></div>
    </div>
    <div class="panel-right" id="panel-right">
      <div style="text-align:center;padding-top:100px;color:var(--hint)">
        <p>Elegí un día y horario para cargar la solicitud</p>
      </div>
    </div>
  </div>`;
}

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  if(!grid) return;
  grid.innerHTML = '';
  DIAS_CORTO.forEach(d => { const el=document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el); });
  
  const firstDay = new Date(state.viewYear, state.viewMonth, 1).getDay();
  const days = new Date(state.viewYear, state.viewMonth + 1, 0).getDate();
  const todayStr = formatDate(new Date());
  const key = state.viewYear + '-' + state.viewMonth;
  const bloques = (state.cache[key] && state.cache[key].bloques) ? state.cache[key].bloques : {};

  for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
  
  for(let d=1; d<=days; d++) {
    const dt = new Date(state.viewYear, state.viewMonth, d);
    const dateStr = formatDate(dt);
    const el = document.createElement('div');
    el.className = 'cal-day' + (dateStr === todayStr ? ' today' : '') + (state.selectedDate === dateStr ? ' selected' : '');
    if(bloques[dateStr]) el.classList.add('has-events');
    el.textContent = d;
    el.onclick = () => selectDate(dateStr);
    grid.appendChild(el);
  }
}

function changeMonth(dir) {
  state.viewMonth += dir;
  if(state.viewMonth > 11) { state.viewMonth = 0; state.viewYear++; }
  if(state.viewMonth < 0) { state.viewMonth = 11; state.viewYear--; }
  document.getElementById('loading-overlay').classList.remove('hidden');
  cargarMes(state.viewYear, state.viewMonth).then(() => {
    document.getElementById('loading-overlay').classList.add('hidden');
    renderCalendar();
    document.getElementById('cal-month-label').textContent = MESES[state.viewMonth] + ' ' + state.viewYear;
  });
}

function selectDate(dateStr) {
  state.selectedDate = dateStr;
  renderCalendar();
  const key = state.viewYear + '-' + state.viewMonth;
  const cfg = state.cache[key].config;
  const bloquesDia = state.cache[key].bloques[dateStr] || [];
  
  let slots = [];
  for(let t = cfg.jornadaIni; t + cfg.durRelev <= cfg.jornadaFin; t += 30) {
    if(bloquesDia.every(b => (t + cfg.durRelev <= b.ini || t >= b.fin))) {
      slots.push({ inicio: minToTime(t), fin: minToTime(t + cfg.durRelev) });
    }
  }
  state.slots = slots;
  
  const wrap = document.getElementById('slots-wrap');
  wrap.innerHTML = '<div class="slots-grid">' + slots.map((s,i) => `
    <div class="slot" onclick="selectSlot(${i})" id="slot-${i}">
      <div class="slot-time">${s.inicio}</div>
    </div>`).join('') + '</div>';
}

function selectSlot(i) {
  state.selectedSlot = state.slots[i];
  document.querySelectorAll('.slot').forEach((s,idx) => s.classList.toggle('selected', idx===i));
  
  document.getElementById('panel-right').innerHTML = `
    <h2 style="margin-bottom:20px">Nueva Solicitud</h2>
    <div id="msg-form" class="msg"></div>
    <div class="field"><label>Vendedor</label><select id="f-vendedor">${VENDEDORES.map(v=>`<option>${v}</option>`).join('')}</select></div>
    <div class="field"><label>Nombre Cliente</label><input type="text" id="f-nombre"></div>
    <div class="field"><label>Teléfono</label><input type="text" id="f-tel"></div>
    <div class="field"><label>Dirección</label><input type="text" id="f-dir"></div>
    <div class="field"><label>Producto</label><input type="text" id="f-prod"></div>
    <button class="btn" id="btn-save" onclick="guardarSolicitud()">Reservar Turno Relevamiento</button>
  `;
}

function guardarSolicitud() {
  const datos = {
    vendedor: document.getElementById('f-vendedor').value,
    clienteNombre: document.getElementById('f-nombre').value,
    clienteTelefono: document.getElementById('f-tel').value,
    clienteDireccion: document.getElementById('f-dir').value,
    producto: document.getElementById('f-prod').value,
    fecha: state.selectedDate,
    horaInicio: state.selectedSlot.inicio
  };
  if(!datos.clienteNombre || !datos.clienteDireccion) return alert('Nombre y Dirección son obligatorios');
  
  document.getElementById('btn-save').disabled = true;
  document.getElementById('btn-save').textContent = 'Guardando...';
  
  apiWrite('registrarProyecto', datos).then(res => {
    if(res.ok) {
      alert('Solicitud creada con éxito. La página se reiniciará.');
      window.location.reload();
    }
  });
}

// ── Render Proyectos Activos ──────────────────────────────────────────────────
function renderTabActivos() {
  const activos = state.proyectos
    .filter(p => p.estado !== 'Cerrado')
    .sort((a, b) => {
      // Ordenar por fechaProximaAccion (Ascendente)
      if (!a.fechaProximaAccion) return 1;
      if (!b.fechaProximaAccion) return -1;
      return a.fechaProximaAccion.localeCompare(b.fechaProximaAccion);
    });

  if(!activos.length) return '<p>No hay proyectos activos.</p>';
  
  const statusClass = { 'Pendiente relevamiento':'s-pendiente', 'Presupuesto pendiente':'s-presupuesto', 'Instalación confirmada':'s-confirmada', 'Instalación programada':'s-programada' };
  
  return activos.map(p => `
    <div class="card">
      <div style="display:flex; justify-content:space-between">
        <span class="card-id">${p.id}</span>
        <span style="font-size:10px; color:var(--accent)">Acción: ${p.fechaProximaAccion || 'Pendiente'}</span>
      </div>
      <div class="card-name">${p.clienteNombre}</div>
      <div class="card-addr">${p.clienteDireccion}</div>
      <span class="status-chip ${statusClass[p.estado] || ''}">${p.estado}</span>
    </div>
  `).join('');
}

// ── Render Confirmar Presupuesto (Venta) ───────────────────────────────────────
function renderTabPresupuesto() {
  const pendientes = state.proyectos.filter(p => p.estado === 'Presupuesto pendiente');
  if(!pendientes.length) return '<div style="text-align:center;padding:40px;color:var(--hint)">No hay presupuestos pendientes de confirmación.</div>';
  
  return pendientes.map(p => `
    <div class="card">
      <div class="card-id">${p.id}</div>
      <div class="card-name">${p.clienteNombre}</div>
      <p style="font-size:12px; margin-bottom:10px">Esperando número de factura para confirmar venta.</p>
      <div class="field" style="margin-bottom:8px">
        <input type="text" id="factura-${p.id}" placeholder="Nro de Factura / Remito">
      </div>
      <button class="btn" onclick="confirmarVenta('${p.id}')">Confirmar Venta y Cobro</button>
    </div>
  `).join('');
}

function confirmarVenta(idProyecto) {
  const nroFactura = document.getElementById('factura-' + idProyecto).value;
  if(!nroFactura) return alert('Debes ingresar el número de factura');
  
  document.getElementById('loading-overlay').classList.remove('hidden');
  apiWrite('confirmarVenta', { idProyecto, nroFactura }).then(res => {
    if(res.ok) {
      alert('Venta confirmada. Ahora el instalador podrá programar la instalación.');
      window.location.reload();
    } else {
      alert('Error al confirmar');
      document.getElementById('loading-overlay').classList.add('hidden');
    }
  });
}

</script>
</body>
</html>
